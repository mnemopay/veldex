services:
  postgres:
    image: postgis/postgis:15-3.4-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: agri_marketplace
    volumes:
      - ./shared/db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d logistics_db"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"

  api-gateway:
    build:
      context: .
      dockerfile: ./services/api-gateway/Dockerfile
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - redis

  marketplace-service:
    build:
      context: .
      dockerfile: ./services/marketplace-service/Dockerfile
    env_file: .env
    restart: on-failure:10
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  ai-migrator:
    image: node:20-alpine
    working_dir: /app
    env_file: .env
    restart: on-failure:10
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./services/ai-service:/app
      - ./shared/events:/app/shared/events
    command: sh -c "npm install && node migrate.js"

  ai-service:
    build:
      context: .
      dockerfile: ./services/ai-service/Dockerfile
    env_file: .env
    restart: on-failure:10
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy
    volumes:
      - ai_models:/models

  ingestion-service:
    build:
      context: .
      dockerfile: ./services/ingestion-service/Dockerfile
    env_file: .env
    restart: on-failure:10
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  logistics-service:
    build:
      context: .
      dockerfile: ./services/logistics-service/Dockerfile
    env_file: .env
    restart: on-failure:10
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  payment-service:
    build:
      context: .
      dockerfile: ./services/payment-service/Dockerfile
    env_file: .env
    restart: on-failure:10
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  seed-runner:
    image: node:20-alpine
    working_dir: /seed
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./shared/seed:/seed
    restart: "no"
    command: sh -c "npm install && node seed.js"

volumes:
  postgres_data:
  ai_models:
